<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Masters 2026 </title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a4a2e;
    --green-mid: #2d6b47;
    --green-light: #3d8b5e;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f5f0e6;
    --white: #faf8f3;
    --red: #b03030;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--green);
    color: var(--cream);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(61,139,94,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 44px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 2px solid rgba(201,168,76,0.4);
  }

  .title-area {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  /* Masters logo */
  .masters-logo {
    width: 100px;
    height: 100px;
    object-fit: contain;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.4));
    flex-shrink: 0;
  }

  /* Fallback badge if logo fails */
  .masters-badge-fallback {
    display: none;
    width: 100px;
    height: 100px;
    background: var(--gold);
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .masters-badge-fallback svg {
    width: 52px;
    height: 52px;
  }

  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 54px;
    font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 1px;
    line-height: 1;
  }

  .title-block .subtitle {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: rgba(245,240,230,0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* ── Header right ── */
  .header-right {
    text-align: right;
    flex-shrink: 0;
  }

  .tournament-status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .tournament-status.live {
    background: rgba(176,48,48,0.85);
    color: white;
  }

  .tournament-status.live .dot {
    width: 10px; height: 10px;
    background: white;
    border-radius: 50%;
    animation: blink 1.2s infinite;
    flex-shrink: 0;
  }

  .tournament-status.upcoming {
    background: rgba(201,168,76,0.15);
    color: var(--gold-light);
    border: 2px solid rgba(201,168,76,0.4);
  }

  .tournament-status.final {
    background: rgba(255,255,255,0.08);
    color: rgba(245,240,230,0.6);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .last-updated {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: rgba(245,240,230,0.35);
    letter-spacing: 1px;
  }

  /* ── Round pills ── */
  .round-info {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
    align-items: center;
  }

  .round-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 6px 18px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.25);
    color: rgba(245,240,230,0.4);
    text-transform: uppercase;
  }

  .round-pill.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ── Leaderboard table ── */
  .leaderboard-wrap {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 3px;
    overflow: hidden;
  }

  .lb-header {
    display: grid;
    grid-template-columns: 70px 1fr 80px 72px 72px 72px 90px;
    padding: 14px 24px;
    background: rgba(201,168,76,0.12);
    border-bottom: 1px solid rgba(201,168,76,0.25);
  }

  .lb-header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .lb-header span:not(:first-child) { text-align: center; }
  .lb-header span:last-child { text-align: right; }

  .lb-row {
    display: grid;
    grid-template-columns: 70px 1fr 80px 72px 72px 72px 90px;
    padding: 18px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    align-items: center;
    opacity: 0;
    animation: slideIn 0.35s forwards;
  }

  .lb-row:last-child { border-bottom: none; }

  .lb-row.top3 {
    background: rgba(201,168,76,0.07);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .pos {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    color: rgba(245,240,230,0.45);
    font-weight: 600;
  }

  .pos.top3  { color: var(--gold); font-size: 20px; }
  .pos.first { font-size: 26px; color: var(--gold-light); }

  .player-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.1;
  }

  .lb-row.top3 .player-name { color: var(--white); font-size: 24px; }

  .player-country {
    font-size: 13px;
    color: rgba(245,240,230,0.4);
    margin-top: 3px;
    letter-spacing: 0.5px;
    font-weight: 300;
  }

  .score-total {
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    font-family: 'Playfair Display', serif;
  }

  .lb-row.top3 .score-total { font-size: 30px; }

  .under { color: #5dba7e; }
  .over  { color: #d97070; }
  .even  { color: var(--cream); }

  .score-cell {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 17px;
    font-weight: 600;
    color: rgba(245,240,230,0.6);
  }

  .score-cell.thru {
    text-align: right;
    font-size: 15px;
    color: rgba(245,240,230,0.4);
  }

  /* ── Pre-tournament / countdown ── */
  .pre-tournament {
    text-align: center;
    padding: 36px 20px;
  }

  .pre-tournament p {
    font-size: 18px;
    color: rgba(245,240,230,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 10px;
  }

  .countdown-grid {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 24px 0 36px;
  }

  .countdown-unit { text-align: center; }

  .countdown-number {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
    display: block;
  }

  .countdown-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(245,240,230,0.4);
    text-transform: uppercase;
    margin-top: 8px;
  }

  .countdown-sep {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    color: rgba(201,168,76,0.3);
    align-self: flex-start;
    padding-top: 6px;
  }

  /* ── Dates banner ── */
  .dates-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    margin: 0 0 28px;
    padding: 20px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
  }

  .date-item { text-align: center; }

  .date-val {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold-light);
    font-weight: 700;
  }

  .date-lbl {
    font-size: 13px;
    color: rgba(245,240,230,0.45);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .dates-banner .sep {
    color: rgba(201,168,76,0.3);
    font-size: 28px;
  }

  /* ── Favorites ── */
  .favorites-section { margin-top: 8px; }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .favorites-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }

  .fav-card {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(201,168,76,0.12);
    padding: 18px 14px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.4s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fav-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--cream);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .fav-odds {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    color: var(--gold);
    font-weight: 600;
  }

  .fav-world-rank {
    font-size: 12px;
    color: rgba(245,240,230,0.35);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 64px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: rgba(245,240,230,0.4);
    letter-spacing: 2px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(201,168,76,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="title-area">

      <!-- Official Masters logo -->
      <img
        class="masters-logo"
        src="https://upload.wikimedia.org/wikipedia/en/thumb/0/08/The_Masters_logo.svg/600px-The_Masters_logo.svg.png"
        alt="The Masters"
        onerror="this.style.display='none';document.getElementById('badge-fallback').style.display='flex';"
      />
      <!-- Fallback: flag + map of Augusta SVG badge -->
      <div class="masters-badge-fallback" id="badge-fallback">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <rect x="22" y="4" width="3" height="38" fill="#1a4a2e" rx="1"/>
          <path d="M25 4 L42 12 L25 20 Z" fill="#1a4a2e"/>
          <circle cx="22" cy="43" r="3" fill="#1a4a2e"/>
        </svg>
      </div>

      <div class="title-block">
        <h1>The Masters</h1>
        <div class="subtitle">Augusta National · 2026 Tournament</div>
      </div>
    </div>

    <div class="header-right">
      <div id="status-badge" class="tournament-status upcoming">APRIL 9–12, 2026</div>
      <div class="last-updated" id="last-updated">—</div>
    </div>
  </div>

  <div id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      LOADING...
    </div>
  </div>

</div>

<script>
  const MASTERS_START = new Date('2026-04-09T08:00:00-04:00');
  const MASTERS_END   = new Date('2026-04-12T20:00:00-04:00');

  function scoreColor(score) {
    if (score === 0 || score === null) return 'even';
    return score < 0 ? 'under' : 'over';
  }

  function formatScore(val) {
    if (val === null || val === undefined) return 'E';
    const n = parseInt(val);
    if (isNaN(n) || n === 0) return 'E';
    return n > 0 ? `+${n}` : `${n}`;
  }

  function updateCountdown() {
    const now = new Date();
    const diff = MASTERS_START - now;
    if (diff <= 0) return null;
    return {
      days:    Math.floor(diff / 86400000),
      hours:   Math.floor((diff % 86400000) / 3600000),
      minutes: Math.floor((diff % 3600000)  / 60000),
      seconds: Math.floor((diff % 60000)    / 1000),
    };
  }

  function renderPreTournament() {
    const cd = updateCountdown();
    const content = document.getElementById('main-content');

    const favs = [
      { name: 'Scottie Scheffler',  odds: '+300',  rank: 'World #1' },
      { name: 'Rory McIlroy',       odds: '+900',  rank: 'World #2' },
      { name: 'Xander Schauffele',  odds: '+1200', rank: 'World #3' },
      { name: 'Collin Morikawa',    odds: '+1400', rank: 'World #4' },
      { name: 'Jon Rahm',           odds: '+1600', rank: 'World #5' },
    ];

    const favCards = favs.map((f, i) => `
      <div class="fav-card" style="animation-delay:${i * 0.08}s">
        <div class="fav-name">${f.name}</div>
        <div class="fav-odds">${f.odds}</div>
        <div class="fav-world-rank">${f.rank}</div>
      </div>
    `).join('');

    content.innerHTML = `
      <div class="pre-tournament">
        <div class="dates-banner">
          <div class="date-item">
            <div class="date-val">APR 9</div>
            <div class="date-lbl">Round 1</div>
          </div>
          <div class="sep">—</div>
          <div class="date-item">
            <div class="date-val">APR 12</div>
            <div class="date-lbl">Final Round</div>
          </div>
          <div class="sep">·</div>
          <div class="date-item">
            <div class="date-val">Augusta National</div>
            <div class="date-lbl">Par 72 · Augusta, Georgia</div>
          </div>
        </div>

        ${cd ? `
          <p>Tournament begins in</p>
          <div class="countdown-grid">
            <div class="countdown-unit">
              <span class="countdown-number" id="cd-days">${String(cd.days).padStart(2,'0')}</span>
              <div class="countdown-label">Days</div>
            </div>
            <div class="countdown-sep">:</div>
            <div class="countdown-unit">
              <span class="countdown-number" id="cd-hours">${String(cd.hours).padStart(2,'0')}</span>
              <div class="countdown-label">Hours</div>
            </div>
            <div class="countdown-sep">:</div>
            <div class="countdown-unit">
              <span class="countdown-number" id="cd-mins">${String(cd.minutes).padStart(2,'0')}</span>
              <div class="countdown-label">Minutes</div>
            </div>
            <div class="countdown-sep">:</div>
            <div class="countdown-unit">
              <span class="countdown-number" id="cd-secs">${String(cd.seconds).padStart(2,'0')}</span>
              <div class="countdown-label">Seconds</div>
            </div>
          </div>
        ` : ''}

        <div class="favorites-section">
          <div class="section-label">Early Favorites</div>
          <div class="favorites-grid">${favCards}</div>
        </div>
      </div>
    `;

    if (cd) {
      setInterval(() => {
        const t = updateCountdown();
        if (!t) { fetchData(); return; }
        const set = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = String(v).padStart(2,'0'); };
        set('cd-days', t.days); set('cd-hours', t.hours); set('cd-mins', t.minutes); set('cd-secs', t.seconds);
      }, 1000);
    }
  }

  function renderLeaderboard(players, roundInfo) {
    const content = document.getElementById('main-content');
    const currentRound = roundInfo?.currentRound || 1;

    const roundPills = ['R1','R2','R3','R4'].map((r, i) => `
      <div class="round-pill ${i + 1 <= currentRound ? 'active' : ''}">${r}</div>
    `).join('');

    const rows = players.slice(0, 10).map((p, i) => {
      const scoreStr   = formatScore(p.totalScore);
      const colorClass = scoreColor(p.totalScore);
      const isTop3     = i < 3;

      const r1 = p.rounds?.[0] ?? '—';
      const r2 = p.rounds?.[1] ?? '—';
      const r3 = p.rounds?.[2] ?? '—';
      const r4 = p.rounds?.[3] ?? '—';
      const thru = p.thru || '—';

      return `
        <div class="lb-row ${isTop3 ? 'top3' : ''}" style="animation-delay:${i * 0.05}s">
          <div class="pos ${isTop3 ? 'top3' : ''} ${i === 0 ? 'first' : ''}">${p.position || i + 1}</div>
          <div>
            <div class="player-name">${p.name}</div>
            <div class="player-country">${p.country || ''}</div>
          </div>
          <div class="score-total ${colorClass}">${scoreStr}</div>
          <div class="score-cell">${r1}</div>
          <div class="score-cell">${r2}</div>
          <div class="score-cell">${r3}</div>
          <div class="score-cell thru">${thru}</div>
        </div>
      `;
    }).join('');

    content.innerHTML = `
      <div class="round-info">
        ${roundPills}
        ${roundInfo?.status ? `<span style="margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:rgba(245,240,230,0.4);letter-spacing:1px;">${roundInfo.status}</span>` : ''}
      </div>
      <div class="leaderboard-wrap">
        <div class="lb-header">
          <span>POS</span><span>PLAYER</span><span>TOTAL</span><span>R1</span><span>R2</span><span>R3</span><span>THRU</span>
        </div>
        ${rows}
      </div>
    `;
  }

  async function fetchESPNLeaderboard() {
    const res  = await fetch('https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard');
    const data = await res.json();

    const masters = (data.events || []).find(e =>
      e.name?.toLowerCase().includes('masters') ||
      e.shortName?.toLowerCase().includes('masters')
    );
    if (!masters) return null;

    const competition = masters.competitions?.[0];
    if (!competition) return null;

    const status       = competition.status?.type?.description || '';
    const currentRound = competition.status?.period || 1;

    const players = (competition.competitors || [])
      .sort((a, b) => (parseInt(a.status?.position?.id) || 999) - (parseInt(b.status?.position?.id) || 999))
      .map(c => {
        const athlete = c.athlete || {};
        const toPar   = c.statistics?.find(s => s.name === 'toPar')?.displayValue;
        const toParNum = toPar ? (toPar === 'E' ? 0 : parseInt(toPar)) : (c.score != null ? parseInt(c.score) : null);
        return {
          name:     athlete.displayName || athlete.fullName || 'Unknown',
          country:  athlete.flag?.alt || '',
          position: c.status?.position?.displayName || c.status?.position?.id || '',
          totalScore: toParNum,
          rounds:   (c.linescores || []).map(ls => ls.value ?? ls.displayValue ?? '—'),
          thru:     c.status?.thru || '',
        };
      });

    return { players, roundInfo: { currentRound, status } };
  }

  async function fetchData() {
    const now   = new Date();
    const badge = document.getElementById('status-badge');
    const updEl = document.getElementById('last-updated');

    if (now < MASTERS_START) {
      badge.className   = 'tournament-status upcoming';
      badge.textContent = 'APRIL 9–12, 2026';
      renderPreTournament();
      return;
    }

    if (now > MASTERS_END) {
      badge.className   = 'tournament-status final';
      badge.textContent = 'TOURNAMENT COMPLETE';
    } else {
      badge.className   = 'tournament-status live';
      badge.innerHTML   = '<span class="dot"></span> LIVE';
    }

    try {
      const result = await fetchESPNLeaderboard();
      if (result && result.players.length > 0) {
        renderLeaderboard(result.players, result.roundInfo);
        updEl.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      } else {
        renderPreTournament();
      }
    } catch (err) {
      renderPreTournament();
      updEl.textContent = 'Data unavailable';
    }
  }

  fetchData();
  setInterval(fetchData, 60000);
</script>
</body>
</html>
